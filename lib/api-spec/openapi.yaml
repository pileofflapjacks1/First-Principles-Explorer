openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: account
    description: Authenticated account info
  - name: images
    description: Server-side image generation (Pro tier)
  - name: stripe
    description: Stripe checkout & customer portal
  - name: breakdown
    description: Server-side first-principles breakdown (Pro tier)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me:
    get:
      operationId: getMe
      tags: [account]
      summary: Current user account & plan
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          description: Unauthorized
  /images:
    post:
      operationId: generateProImage
      tags: [images]
      summary: Generate an image with Grok Imagine (Pro tier required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageInput"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedImage"
        "401":
          description: Unauthorized
        "402":
          description: Pro tier required
        "429":
          description: Monthly image limit reached
  /breakdown:
    post:
      operationId: generateProBreakdown
      tags: [breakdown]
      summary: Generate a first-principles breakdown for a topic (Pro tier required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreakdownInput"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized
        "402":
          description: Pro tier required
        "502":
          description: Upstream model error
  /breakdown/gaps:
    post:
      operationId: regenerateProGaps
      tags: [breakdown]
      summary: Regenerate the innovation gaps for a topic (Pro tier required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GapsInput"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [gaps]
                properties:
                  gaps:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "401":
          description: Unauthorized
        "402":
          description: Pro tier required
        "502":
          description: Upstream model error
  /stripe/checkout:
    post:
      operationId: createStripeCheckoutSession
      tags: [stripe]
      summary: Create a Stripe Checkout session for the Pro subscription
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeCheckoutRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeRedirect"
        "401":
          description: Unauthorized
        "502":
          description: Stripe error
  /stripe/portal:
    post:
      operationId: createStripePortalSession
      tags: [stripe]
      summary: Create a Stripe Billing Portal session for the current user
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeRedirect"
        "401":
          description: Unauthorized
        "404":
          description: No Stripe customer for this account
        "502":
          description: Stripe error
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Account:
      type: object
      required:
        - userId
        - isPro
        - imagesGeneratedThisMonth
        - monthlyImageLimit
      properties:
        userId:
          type: string
        email:
          type: ["string", "null"]
        isPro:
          type: boolean
        imagesGeneratedThisMonth:
          type: integer
        monthlyImageLimit:
          type: integer
    ImageInput:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
    GeneratedImage:
      type: object
      required: [url, imagesGeneratedThisMonth]
      properties:
        url:
          type: string
        imagesGeneratedThisMonth:
          type: integer
    StripeRedirect:
      type: object
      required: [url]
      properties:
        url:
          type: string
    BreakdownInput:
      type: object
      required: [topic]
      properties:
        topic:
          type: string
          minLength: 1
    GapsInput:
      type: object
      required: [topic, breakdownTitles]
      properties:
        topic:
          type: string
          minLength: 1
        breakdownTitles:
          type: array
          items:
            type: string
    StripeCheckoutRequest:
      type: object
      properties:
        interval:
          type: string
          enum: [month, year]
          default: month
